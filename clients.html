<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCraft - Clients</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topbar">
        <button id="menu-btn" class="icon-btn" aria-label="Menu">☰</button>
        <h1 class="logo" onclick="window.location.href='index.html'"><img src="images/Logo.png" alt="MyCraft"></h1>
        <button id="profile-btn" class="icon-btn" aria-label="Profil"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="5"/><path d="M4 22c0-4 3.6-7 8-7s8 3 8 7"/></svg></button>
    </header>

    <div class="app-layout">

        <aside id="sidebar" class="sidebar">
            <nav>
                <ul>
                    <li><a href="index.html">Tableau de bord</a></li>
                    <li><a href="quotes.html">Devis</a></li>
                    <li><a href="invoices.html">Factures</a></li>
                    <li><a href="clients.html" class="active">Clients</a></li>
                    <li><a href="catalog.html">Catalogue</a></li>
                    <li><a href="settings.html">Paramètres</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">

            <section class="cards-row">
                <article class="card">
                    <h2>Nombre de clients</h2>
                    <p class="data" id="clients-count">0</p>
                </article>
                <article class="card action-card">
                    <h2>Nouveau client</h2>
                    <button id="new-client-btn" class="avatar-btn">
                        <svg viewBox="0 0 24 24" width="52" height="52" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="8" r="5"/>
                            <line x1="12" y1="5" x2="12" y2="11"/>
                            <line x1="9" y1="8" x2="15" y2="8"/>
                            <path d="M4 22c0-4 3.6-7 8-7s8 3 8 7"/>
                        </svg>
                    </button>
                </article>
            </section>

            <hr class="section-separator">

            <div class="search-bar">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#888" stroke-width="2">
                    <circle cx="11" cy="11" r="7"/>
                    <line x1="16.5" y1="16.5" x2="22" y2="22"/>
                </svg>
                <input type="text" id="client-search" placeholder="Rechercher...">
            </div>

            <div id="clients-grid" class="clients-grid"></div>
            <p class="empty-msg" id="clients-empty">Aucun client enregistré pour le moment.</p>

        </main>
    </div>

    <footer>
        <p>&copy; 2026 MyCraft — Carbon footprint graded <a href="https://www.websitecarbon.com/website/rp-13-p-github-io-mycraft_webint/" target="_blank" rel="noopener noreferrer">A+</a></p>
    </footer>

    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
    <script src="js/clients.js"></script>
</body>
</html>
