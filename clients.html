<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCraft - Clients</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topbar">
        <button id="menu-btn" class="icon-btn" aria-label="Menu">☰</button>
        <h1 class="logo">My Craft</h1>
        <button id="profile-btn" class="icon-btn" aria-label="Profil">P</button>
    </header>

    <div class="app-layout">

        <aside id="sidebar" class="sidebar">
            <nav>
                <ul>
                    <li><a href="index.html">DashBoard</a></li>
                    <li><a href="quotes.html">Quotes</a></li>
                    <li><a href="invoices.html">Invoices</a></li>
                    <li><a href="clients.html" class="active">Clients</a></li>
                    <li><a href="catalog.html">Catalogue</a></li>
                    <li><a href="settings.html">Settings</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content page-content">

            <section class="page-header">
                <h1>Clients</h1>
                <button type="button" id="new-client-btn">+ Nouveau client</button>
            </section>

            <!-- Formulaire de création -->
            <section id="client-form-section">
                <h2>Nouveau client</h2>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="client-name">Nom *</label>
                        <input type="text" id="client-name" placeholder="Nom du client">
                    </div>
                    <div class="form-group">
                        <label for="client-type">Type</label>
                        <select id="client-type">
                            <option value="Particulier">Particulier</option>
                            <option value="Professionnel">Professionnel</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="client-email">Email</label>
                        <input type="email" id="client-email" placeholder="email@exemple.fr">
                    </div>
                    <div class="form-group">
                        <label for="client-phone">Téléphone</label>
                        <input type="tel" id="client-phone" placeholder="+33 6 12 34 56 78">
                    </div>
                    <div class="form-group">
                        <label for="client-address">Adresse</label>
                        <input type="text" id="client-address" placeholder="Adresse du client">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" id="save-client-btn">Enregistrer</button>
                    <button type="button" id="cancel-client-btn">Annuler</button>
                </div>
            </section>

            <!-- Liste des clients -->
            <section class="list-section">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Type</th>
                            <th>Email</th>
                            <th>Téléphone</th>
                            <th>Adresse</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <!-- Les lignes du tableau sont générées par clients.js -->
                    <tbody id="clients-tbody"></tbody>
                </table>
                <p class="empty-msg" id="clients-empty">Aucun client enregistré pour le moment.</p>
            </section>

        </main>
    </div>

    <footer>
        <p>&copy; 2026 MyCraft</p>
    </footer>

    <script src="store.js"></script>
    <script src="app.js"></script>
    <script src="clients.js"></script>
</body>
</html>
