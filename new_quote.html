<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCraft - Nouveau devis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topbar">
        <button id="menu-btn" class="icon-btn" aria-label="Menu">☰</button>
        <h1 class="logo" onclick="window.location.href='index.html'"><img src="images/Logo.png" alt="MyCraft"></h1>
        <button id="profile-btn" class="icon-btn" aria-label="Profil"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="5"/><path d="M4 22c0-4 3.6-7 8-7s8 3 8 7"/></svg></button>
    </header>

    <div class="app-layout">

        <aside id="sidebar" class="sidebar">
            <nav>
                <ul>
                    <li><a href="index.html">DashBoard</a></li>
                    <li><a href="quotes.html" class="active">Quotes</a></li>
                    <li><a href="invoices.html">Invoices</a></li>
                    <li><a href="clients.html">Clients</a></li>
                    <li><a href="catalog.html">Catalogue</a></li>
                    <li><a href="settings.html">Settings</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content page-content">

            <section class="page-header">
                <h1>Nouveau devis</h1>
            </section>

            <section id="quote-form-section">

                <div class="form-grid">
                    <div class="form-group">
                        <label for="quote-client">Client *</label>
                        <input type="text" id="quote-client" placeholder="Nom du client">
                    </div>
                    <div class="form-group">
                        <label for="quote-date">Date</label>
                        <input type="date" id="quote-date">
                    </div>
                    <div class="form-group">
                        <label for="quote-validity">Validité (jours)</label>
                        <input type="number" id="quote-validity" value="30" min="1">
                    </div>
                    <div class="form-group">
                        <label for="quote-status">Statut</label>
                        <select id="quote-status">
                            <option value="Brouillon">Brouillon</option>
                            <option value="Envoyé">Envoyé</option>
                            <option value="Accepté">Accepté</option>
                            <option value="Refusé">Refusé</option>
                        </select>
                    </div>
                </div>

                <h3>Lignes de prestation</h3>
                <div class="lines-header">
                    <span>Description</span>
                    <span>Qté</span>
                    <span>Prix HT (€)</span>
                    <span>TVA (%)</span>
                    <span>Total HT</span>
                    <span></span>
                </div>

                <div id="quote-lines"></div>

                <button type="button" id="add-line-btn">+ Ajouter une ligne</button>

                <div class="totals-section">
                    <p>Total HT : <span id="total-ht">0,00 €</span></p>
                    <p>Total TVA : <span id="total-tva">0,00 €</span></p>
                    <p><strong>Total TTC : <span id="total-ttc">0,00 €</span></strong></p>
                </div>

                <div class="form-actions">
                    <button type="button" id="save-quote-btn">Enregistrer</button>
                    <button type="button" id="cancel-quote-btn">Annuler</button>
                </div>
            </section>

        </main>
    </div>

    <footer>
        <p>&copy; 2026 MyCraft</p>
    </footer>

    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
    <script src="js/new_quote.js"></script>
</body>
</html>
