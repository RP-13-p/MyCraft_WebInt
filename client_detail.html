<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCraft - Client</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

    <header class="topbar">
        <button id="menu-btn" class="icon-btn" aria-label="Menu">☰</button>
        <h1 class="logo" onclick="window.location.href='index.html'"><img src="images/Logo.png" alt="MyCraft"></h1>
        <button id="profile-btn" class="icon-btn" aria-label="Profil"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="5"/><path d="M4 22c0-4 3.6-7 8-7s8 3 8 7"/></svg></button>
    </header>

    <div class="app-layout">

        <aside id="sidebar" class="sidebar">
            <nav>
                <ul>
                    <li><a href="index.html">Tableau de bord</a></li>
                    <li><a href="quotes.html">Devis</a></li>
                    <li><a href="invoices.html">Factures</a></li>
                    <li><a href="clients.html" class="active">Clients</a></li>
                    <li><a href="catalog.html">Catalogue</a></li>
                    <li><a href="settings.html">Paramètres</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content page-content">

            <section class="page-header">
                <h1 id="page-title">Client</h1>
            </section>

            <section id="client-form-section">
                <h2>Informations du client</h2>

                <form id="client-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="client-name">Nom *</label>
                            <input type="text" id="client-name" placeholder="Nom du client" required disabled>
                        </div>
                        <div class="form-group">
                            <label for="client-type">Type</label>
                            <select id="client-type" disabled>
                                <option value="Particulier">Particulier</option>
                                <option value="Professionnel">Professionnel</option>
                            </select>
                        </div>
                        <div class="form-group" id="siret-group" style="display:none">
                            <label for="client-siret">SIRET</label>
                            <input type="text" id="client-siret" placeholder="14 chiffres" disabled>
                        </div>
                        <div class="form-group">
                            <label for="client-email">Email</label>
                            <input type="email" id="client-email" placeholder="email@exemple.fr" disabled>
                        </div>
                        <div class="form-group">
                            <label for="client-phone">Téléphone</label>
                            <input type="tel" id="client-phone" placeholder="+33 6 12 34 56 78" disabled>
                        </div>
                        <div class="form-group">
                            <label for="client-address">Adresse</label>
                            <input type="text" id="client-address" placeholder="Adresse du client" disabled>
                            <p id="geo-status" class="geo-status"></p>
                        </div>
                    </div>

                    <div id="client-map"></div>

                    <div class="form-actions">
                        <button type="button" id="modify-btn" style="background:#1e03cb;color:white">Modifier</button>
                        <button type="button" id="save-btn" style="display:none;background:#1e03cb;color:white">Enregistrer</button>
                        <button type="button" id="cancel-btn">Annuler</button>
                    </div>
                </form>
            </section>

        </main>
    </div>

    <footer>
        <p>&copy; 2026 MyCraft — Carbon footprint graded <a href="https://www.websitecarbon.com/website/rp-13-p-github-io-mycraft_webint/" target="_blank" rel="noopener noreferrer">A+</a></p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
    <script src="js/client_detail.js"></script>
</body>
</html>
