<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCraft - Devis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topbar">
        <button id="menu-btn" class="icon-btn" aria-label="Menu">☰</button>
        <h1 class="logo">My Craft</h1>
        <button id="profile-btn" class="icon-btn" aria-label="Profil"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="5"/><path d="M4 22c0-4 3.6-7 8-7s8 3 8 7"/></svg></button>
    </header>

    <div class="app-layout">

        <aside id="sidebar" class="sidebar">
            <nav>
                <ul>
                    <li><a href="index.html">DashBoard</a></li>
                    <li><a href="quotes.html" class="active">Quotes</a></li>
                    <li><a href="invoices.html">Invoices</a></li>
                    <li><a href="clients.html">Clients</a></li>
                    <li><a href="catalog.html">Catalogue</a></li>
                    <li><a href="settings.html">Settings</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">

            <section class="cards-row">
                <article class="card">
                    <h2>Signed this month</h2>
                    <p class="data" id="signed-count">0</p>
                </article>
                <article class="card">
                    <h2>Not Signed</h2>
                    <p class="data" id="not-signed-count">0</p>
                </article>
                <article class="card action-card">
                    <h2>New Quote</h2>
                    <button id="new-quote-btn" class="big-btn">+</button>
                </article>
            </section>

            <section class="list-section">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>N° Devis</th>
                            <th>Client</th>
                            <th>Montant</th>
                            <th>Statut</th>
                            <th>Date</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="quotes-tbody"></tbody>
                </table>
                <p class="empty-msg" id="quotes-empty">Aucun devis enregistré pour le moment.</p>
            </section>

        </main>
    </div>

    <footer>
        <p>&copy; 2026 MyCraft</p>
    </footer>

    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
    <script src="js/quotes.js"></script>
</body>
</html>
