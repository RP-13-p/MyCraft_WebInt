<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCraft - Factures</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topbar">
        <button id="menu-btn" class="icon-btn" aria-label="Menu">☰</button>
        <h1 class="logo" onclick="window.location.href='index.html'"><img src="images/Logo.png" alt="MyCraft"></h1>
        <button id="profile-btn" class="icon-btn" aria-label="Profil"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="5"/><path d="M4 22c0-4 3.6-7 8-7s8 3 8 7"/></svg></button>
    </header>

    <div class="app-layout">

        <aside id="sidebar" class="sidebar">
            <nav>
                <ul>
                    <li><a href="index.html">Tableau de bord</a></li>
                    <li><a href="quotes.html">Devis</a></li>
                    <li><a href="invoices.html" class="active">Factures</a></li>
                    <li><a href="clients.html">Clients</a></li>
                    <li><a href="catalog.html">Catalogue</a></li>
                    <li><a href="settings.html">Paramètres</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">

            <section class="cards-row">
                <article class="card">
                    <h2>Payées ce mois</h2>
                    <p class="data" id="paid-count">0</p>
                </article>
                <article class="card">
                    <h2>Impayées</h2>
                    <p class="data" id="not-paid-count">0</p>
                </article>
                <article class="card action-card">
                    <h2>Nouvelle facture</h2>
                    <button id="new-invoice-btn" class="big-btn">+</button>
                </article>
            </section>

            <section class="list-section">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>N° Facture</th>
                            <th>Client</th>
                            <th>Montant TTC</th>
                            <th>Coût</th>
                            <th>Résultat</th>
                            <th>Statut</th>
                            <th>Échéance</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="invoices-tbody"></tbody>
                </table>
                <p class="empty-msg" id="invoices-empty">Aucune facture enregistrée pour le moment.</p>
            </section>

        </main>
    </div>

    <footer>
        <p>&copy; 2026 MyCraft</p>
    </footer>

    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
    <script src="js/invoices.js"></script>
</body>
</html>
