<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCraft - Nouvelle prestation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topbar">
        <button id="menu-btn" class="icon-btn" aria-label="Menu">☰</button>
        <h1 class="logo" onclick="window.location.href='index.html'"><img src="images/Logo.png" alt="MyCraft"></h1>
        <button id="profile-btn" class="icon-btn" aria-label="Profil"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="5"/><path d="M4 22c0-4 3.6-7 8-7s8 3 8 7"/></svg></button>
    </header>

    <div class="app-layout">

        <aside id="sidebar" class="sidebar">
            <nav>
                <ul>
                    <li><a href="index.html">Tableau de bord</a></li>
                    <li><a href="quotes.html">Devis</a></li>
                    <li><a href="invoices.html">Factures</a></li>
                    <li><a href="clients.html">Clients</a></li>
                    <li><a href="catalog.html" class="active">Catalogue</a></li>
                    <li><a href="settings.html">Paramètres</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content page-content">

            <section class="page-header">
                <h1>Nouvelle prestation</h1>
            </section>

            <section id="catalog-form-section">

                <div class="form-grid">
                    <div class="form-group">
                        <label for="catalog-name">Nom *</label>
                        <input type="text" id="catalog-name" placeholder="Nom de la prestation">
                    </div>
                    <div class="form-group">
                        <label for="catalog-category">Catégorie</label>
                        <input type="text" id="catalog-category" placeholder="Ex: Plomberie, Électricité...">
                    </div>
                    <div class="form-group">
                        <label for="catalog-price">Prix HT (€)</label>
                        <input type="number" id="catalog-price" value="0" min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="catalog-tax">TVA (%)</label>
                        <select id="catalog-tax">
                            <option value="20">20%</option>
                            <option value="10">10%</option>
                            <option value="5.5">5,5%</option>
                            <option value="0">0%</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="catalog-avgcost">Coût moyen (€)</label>
                        <input type="number" id="catalog-avgcost" value="0" min="0" step="0.01">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" id="save-catalog-btn">Enregistrer</button>
                    <button type="button" id="cancel-catalog-btn">Annuler</button>
                </div>
            </section>

        </main>
    </div>

    <footer>
        <p>&copy; 2026 MyCraft</p>
    </footer>

    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
    <script src="js/new_catalog.js"></script>
</body>
</html>
