<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCraft - Devis</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="pdf.css">
</head>
<body>

    <header class="topbar">
        <button id="menu-btn" class="icon-btn" aria-label="Menu">☰</button>
        <h1 class="logo" onclick="window.location.href='index.html'"><img src="images/Logo.png" alt="MyCraft"></h1>
        <button id="profile-btn" class="icon-btn" aria-label="Profil"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="5"/><path d="M4 22c0-4 3.6-7 8-7s8 3 8 7"/></svg></button>
    </header>

    <div class="app-layout">

        <aside id="sidebar" class="sidebar">
            <nav>
                <ul>
                    <li><a href="index.html">Tableau de bord</a></li>
                    <li><a href="quotes.html" class="active">Devis</a></li>
                    <li><a href="invoices.html">Factures</a></li>
                    <li><a href="clients.html">Clients</a></li>
                    <li><a href="catalog.html">Catalogue</a></li>
                    <li><a href="settings.html">Paramètres</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content page-content">

            <section class="page-header">
                <h1 id="page-title">Devis</h1>
            </section>

            <section id="quote-form-section">

                <form id="quote-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>N° Devis</label>
                            <input type="text" id="quote-number" disabled>
                        </div>
                        <div class="form-group">
                            <label for="quote-client">Client</label>
                            <select id="quote-client" disabled>
                                <option value="">-- Choisir un client --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="quote-date">Date</label>
                            <input type="date" id="quote-date" disabled>
                        </div>
                        <div class="form-group">
                            <label for="quote-validity">Validité (jours)</label>
                            <input type="number" id="quote-validity" min="1" disabled>
                            <small id="quote-expiry" style="color:#666"></small>
                        </div>
                        <div class="form-group">
                            <label for="quote-status">Statut</label>
                            <select id="quote-status" disabled>
                                <option value="Brouillon">Brouillon</option>
                                <option value="Envoyé">Envoyé</option>
                                <option value="Signé">Signé</option>
                                <option value="Validé">Validé</option>
                                <option value="Facturé">Facturé</option>
                            </select>
                        </div>
                    </div>

                    <h3>Lignes de prestation</h3>
                    <div class="lines-header">
                        <span>Catalogue</span>
                        <span>Description</span>
                        <span>Qté</span>
                        <span>Prix HT (€)</span>
                        <span>TVA (%)</span>
                        <span>Total HT</span>
                        <span></span>
                    </div>

                    <div id="quote-lines"></div>

                    <button type="button" id="add-line-btn" style="display:none">+ Ajouter une ligne</button>

                    <div class="totals-section">
                        <p>Total HT : <span id="total-ht">0,00 €</span></p>
                        <p>Total TVA : <span id="total-tva">0,00 €</span></p>
                        <p><strong>Total TTC : <span id="total-ttc">0,00 €</span></strong></p>
                        <p>Coût total : <span id="total-cost">0,00 €</span></p>
                        <p>Résultat : <span id="total-profit">0,00 €</span></p>
                    </div>

                    <div class="form-actions">
                        <button type="button" id="modify-btn" style="background:#1e03cb;color:white">Modifier</button>
                        <button type="button" id="save-btn" style="display:none;background:#1e03cb;color:white">Enregistrer</button>
                        <button type="button" id="cancel-btn">Annuler</button>
                    </div>
                </form>
            </section>

            <div id="print-document" class="print-document"></div>

        </main>
    </div>

    <footer>
        <p>&copy; 2026 MyCraft</p>
    </footer>

    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
    <script src="js/print.js"></script>
    <script src="js/quote_detail.js"></script>
</body>
</html>
