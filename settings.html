<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCraft - Paramètres Compte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NavBar -->
    <header class="topbar">
        <a href="index.html" class="icon-btn" aria-label="Retour">←</a>
        <h1 class="logo" onclick="window.location.href='index.html'"><img src="images/Logo.png" alt="MyCraft"></h1>
        <button class="icon-btn" aria-label="Profil" style="visibility:hidden;">P</button>
    </header>

    <div class="app-layout">

        <!-- Main Content -->
        <main class="main-content settings-content">
            <form id="settings-form">
            <h1>Paramètres du Compte</h1>

            <!-- Section Informations Personnelles -->
            <section class="settings-section">
                <h2>Informations Personnelles</h2>
                <div class="settings-group">
                    <div class="settings-item">
                        <label for="set-username">Nom d'utilisateur :</label>
                        <input type="text" id="set-username" class="settings-input" value="Artisan Pro">
                    </div>
                    <div class="settings-item">
                        <label for="set-email">Email :</label>
                        <input type="email" id="set-email" class="settings-input" value="contact@craft.fr">
                    </div>
                    <div class="settings-item">
                        <label for="set-phone">Téléphone :</label>
                        <input type="tel" id="set-phone" class="settings-input" value="+33 6 12 34 56 78">
                    </div>
                    <div class="settings-item">
                        <label for="set-address">Adresse :</label>
                        <input type="text" id="set-address" class="settings-input" value="123 rue d'Eurecom, Sophia Antipolis">
                    </div>
                </div>
            </section>

            <!-- Section Entreprise -->
            <section class="settings-section">
                <h2>Informations Entreprise</h2>
                <div class="settings-group">
                    <div class="settings-item">
                        <label for="set-company">Nom Entreprise :</label>
                        <input type="text" id="set-company" class="settings-input" value="Artisan Pro SARL">
                    </div>
                    <div class="settings-item">
                        <label for="set-siret">SIRET :</label>
                        <input type="text" id="set-siret" class="settings-input" value="12345678901234">
                    </div>
                    <div class="settings-item">
                        <label for="set-sector">Secteur d'activité :</label>
                        <input type="text" id="set-sector" class="settings-input" value="Menuiserie / Ébénisterie">
                    </div>
                    <div class="settings-item">
                        <label for="set-employees">Nombre d'employés :</label>
                        <input type="number" id="set-employees" class="settings-input" value="5" min="0">
                    </div>
                </div>
            </section>

            <!-- Section Sécurité -->
            <section class="settings-section">
                <h2>Sécurité</h2>
                <div class="settings-group">
                    <button type="button" class="settings-btn">Changer le mot de passe</button>
                    <button type="button" class="settings-btn">Authentification à deux facteurs</button>
                </div>
            </section>

            <!-- Section Préférences -->
            <section class="settings-section">
                <h2>Préférences</h2>
                <div class="settings-group">
                    <div class="settings-item checkbox-item">
                        <input type="checkbox" id="email-notifications" checked>
                        <label for="email-notifications">Notifications par email</label>
                    </div>
                    <div class="settings-item checkbox-item">
                        <input type="checkbox" id="sms-notifications">
                        <label for="sms-notifications">Notifications par SMS</label>
                    </div>
                    <div class="settings-item checkbox-item">
                        <input type="checkbox" id="news" checked>
                        <label for="news">Recevoir les actualités</label>
                    </div>
                </div>
            </section>

            <!-- Bouton d'enregistrement -->
            <div class="settings-actions">
                <button type="submit" id="save-settings-btn" class="settings-btn">Enregistrer les modifications</button>
                <p id="settings-saved-msg" class="saved-msg">Modifications enregistrées ✓</p>
            </div>

            </form>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 MyCraft</p>
    </footer>

    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
