<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCraft - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- NavBar -->
    <header class="topbar">
        <button id="menu-btn" class="icon-btn" aria-label="Menu">☰</button>
        <h1 class="logo" onclick="window.location.href='index.html'"><img src="images/Logo.png" alt="MyCraft"></h1>
        <button id="profile-btn" class="icon-btn" aria-label="Profil"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="5"/><path d="M4 22c0-4 3.6-7 8-7s8 3 8 7"/></svg></button>
    </header>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <nav>
                <ul>
                    <li><a href="index.html" class="active">Tableau de bord</a></li>
                    <li><a href="quotes.html">Devis</a></li>
                    <li><a href="invoices.html">Factures</a></li>
                    <li><a href="clients.html">Clients</a></li>
                    <li><a href="catalog.html">Catalogue</a></li>
                    <li><a href="settings.html">Paramètres</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content --> 
        <main class="main-content dashboard-content">
            
            <!-- Line 1 : Stats -->
            <section class="grid-row top-stats">
                <article class="card circle-card">
                    <p id="dash-date">--/--/----</p>
                    <p id="dash-time">--h--</p>
                </article>
                <article class="card">
                    <h2>Chiffre d'affaires (mois)</h2>
                    <p class="data" id="dash-revenue">0,00 €</p>
                </article>
                <article class="card">
                    <h2>Résultat (mois)</h2>
                    <p class="data" id="dash-profit">+ 0,00 €</p>
                </article>
                <article class="card">
                    <h2>Interventions (mois)</h2>
                    <p class="data" id="dash-interventions">0</p>
                </article>
            </section>

            <!-- Line 2 : Actions et Alerts -->
            <section class="grid-row bottom-actions">
                <article class="card action-card">
                    <h2>Nouveau devis</h2>
                    <button id="dashboard-new-quote-btn" class="big-btn" onclick="window.location.href='new_quote.html'">+</button>
                </article>

                <article class="card action-card">
                    <h2>Nouvelle facture</h2>
                    <button id="dashboard-new-invoice-btn" class="big-btn" onclick="window.location.href='new_invoice.html'">+</button>
                </article>

                <article class="card action-card">
                    <h2>Nouveau client</h2>
                    <button class="big-btn" onclick="window.location.href='new_client.html'">+</button>
                </article>
            </section>
    
        </main>
    </div>
    <footer>
        <p>&copy; 2026 MyCraft </p>
    </footer>
    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
